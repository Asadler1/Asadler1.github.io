<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anthony Sadler — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0a0a0a;
    --bg-1: #1a1a1a;
    --bg-2: #262626;
    --text-primary: #ffffff;
    --text-secondary: #a8a8a8;
    --accent: #00d9ff;
    --accent-alt: #6366f1;
    --accent-alt-2: #ec4899;
    --border: #333333;
    --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.4);
    --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-0);
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10, 10, 10, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
  }
  .nav-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }
  .nav-name {
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--text-primary);
    text-decoration: none;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent), var(--accent-alt));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .nav-links { display: flex; gap: 1.5rem; }
  .nav-links a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.3s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 2px;
    background: var(--accent);
    transition: width 0.3s;
  }
  .nav-links a:hover,
  .nav-links a.active {
    color: var(--text-primary);
  }
  .nav-links a.active::after { width: 100%; }

  .hero {
    background: linear-gradient(135deg, rgba(0, 217, 255, 0.05) 0%, rgba(99, 102, 241, 0.05) 100%);
    border-bottom: 1px solid var(--border);
    padding: 5rem 2rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -200px;
    right: -100px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0, 217, 255, 0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -200px;
    left: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .hero-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 3rem;
    align-items: center;
    position: relative;
  }
  .hero-info h1 {
    font-size: 3.5rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
    line-height: 1.1;
  }
  .hero-info .title {
    font-size: 1.1rem;
    color: var(--text-secondary);
    font-weight: 400;
    margin-bottom: 2rem;
  }
  .hero-info .title span {
    color: var(--accent);
    font-weight: 600;
  }
  .hero-contact {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .hero-contact a {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.3s;
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .hero-contact a:hover {
    background: rgba(0, 217, 255, 0.1);
    color: var(--accent);
    border-color: var(--accent);
  }
  .hero-contact a svg {
    width: 16px;
    height: 16px;
  }
  .hero-photo {
    width: 280px;
    height: 280px;
    border-radius: 12px;
    object-fit: cover;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
  }
  .resume-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: linear-gradient(135deg, var(--accent), var(--accent-alt));
    color: #000;
    padding: 0.7rem 1.6rem;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.85rem;
    margin-top: 2rem;
    transition: all 0.3s;
    border: none;
    cursor: pointer;
  }
  .resume-btn:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 4rem 2rem;
  }

  section {
    margin-bottom: 4rem;
    scroll-margin-top: 80px;
  }

  .section-title {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 2rem;
    position: relative;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .section-title::before {
    content: '';
    width: 4px;
    height: 28px;
    background: linear-gradient(180deg, var(--accent), var(--accent-alt));
    border-radius: 2px;
  }

  .bio p {
    font-size: 1rem;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
    max-width: 900px;
    line-height: 1.8;
  }

  .interests {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    margin-top: 1.5rem;
  }
  .interest-tag {
    background: rgba(0, 217, 255, 0.1);
    color: var(--accent);
    padding: 0.5rem 1.2rem;
    border-radius: 24px;
    font-size: 0.8rem;
    font-weight: 600;
    border: 1px solid rgba(0, 217, 255, 0.2);
    transition: all 0.3s;
  }
  .interest-tag:hover {
    background: rgba(0, 217, 255, 0.2);
    border-color: var(--accent);
  }

  .experience-grid {
    display: grid;
    gap: 1.5rem;
  }
  .exp-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    transition: all 0.3s;
  }
  .exp-card:hover {
    background: var(--bg-2);
    border-color: var(--accent);
    box-shadow: var(--shadow-md);
  }
  .exp-card h3 {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 0.3rem;
  }
  .exp-card .org {
    color: var(--accent);
    font-weight: 600;
    font-size: 0.9rem;
  }
  .exp-card .date {
    color: var(--text-secondary);
    font-size: 0.8rem;
    margin-bottom: 1rem;
  }
  .exp-card p {
    font-size: 0.95rem;
    color: var(--text-secondary);
  }

  footer {
    background: var(--bg-1);
    border-top: 1px solid var(--border);
    color: var(--text-secondary);
    text-align: center;
    padding: 3rem 2rem;
    font-size: 0.8rem;
  }
  footer a {
    color: var(--accent);
    text-decoration: none;
    transition: color 0.3s;
  }
  footer a:hover { color: var(--accent-alt); }

  @media (max-width: 768px) {
    .hero-inner {
      grid-template-columns: 1fr;
      text-align: center;
      gap: 2rem;
    }
    .hero-photo {
      margin: 0 auto;
      width: 200px;
      height: 200px;
    }
    .hero-info h1 { font-size: 2.2rem; }
    .hero-contact { justify-content: center; }
    .section-title { font-size: 1.5rem; }
    .section-title::before { width: 3px; height: 20px; }
    nav { padding: 0 1rem; }
    .nav-inner { height: 56px; }
    .nav-links { gap: 1rem; font-size: 0.8rem; }
    main { padding: 2rem 1rem; }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  body { animation: fadeIn 0.6s ease-out; }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="#" class="nav-name" id="nav-name"></a>
    <div class="nav-links">
      <a href="#about" class="active">Home</a>
      <a href="#experience">Experience</a>
      <a href="#publications">Publications</a>
      <a href="#awards">Awards</a>
    </div>
  </div>
</nav>

<header class="hero">
  <div class="hero-inner">
    <div class="hero-info">
      <h1 id="hero-name"></h1>
      <div class="title" id="hero-title"></div>
      <div class="hero-contact">
        <a id="email-link" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 4 10 8 10-8"/></svg>
          Email
        </a>
        <a id="linkedin-link" href="#" target="_blank">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66z"/></svg>
          LinkedIn
        </a>
        <a id="github-link" href="#" target="_blank">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub
        </a>
      </div>
      <a href="#" class="resume-btn" id="resume-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></svg>
        Resume
      </a>
    </div>
    <img class="hero-photo" id="hero-photo" src="images/me.jpg" alt="Anthony Sadler">
  </div>
</header>

<main>
  <section id="about" class="bio">
    <h2 class="section-title">About</h2>
    <p id="bio-1"></p>
    <p id="bio-2"></p>
    <h3 style="font-size:0.9rem; color:var(--text-primary); margin-top:2rem; margin-bottom:1rem; font-weight:600;">Skills &amp; Interests</h3>
    <div class="interests" id="skills-container"></div>
  </section>

  <section id="experience">
    <h2 class="section-title">Experience</h2>
    <div class="experience-grid" id="experience-container"></div>
  </section>

  <section id="publications">
    <h2 class="section-title">Publications</h2>
    <div class="experience-grid" id="publications-container"></div>
  </section>

  <section id="awards">
    <h2 class="section-title">Awards</h2>
    <div class="experience-grid" id="awards-container"></div>
  </section>
</main>

<footer id="footer"></footer>

<script>
  // ╔═══════════════════════════════════════════════════════════════╗

  const email      = "sadleranthony18@gmai@gmail.com";
  const title      = "RFID Engineer / Software Developer";
  const company    = "Los Alamos National Laboratory";
  const myLocation = "Los Alamos, New Mexico";
  const github     = "https://github.com/Asadler1";
  const linkedin   = "https://www.linkedin.com/in/anthony-sadler-2498b0256";
  const resumeURL  = "#";  // Replace with a link to your resume PDF

  const bio1 = "I currently work at Los Alamos National Laboratory and graduated from St. Mary's University in 2023 with a BS in Engineering Science. I am also working on a MS in Transdisciplinary Cyber Security at New Mexico Tech, where I am expected to graduate in May 2026.";

  const bio2 = "My interests span RFID systems, embedded software, cybersecurity, and full-stack web development. I enjoy building tools that solve real problems and am always looking for new challenges.";

  const skills = [
    "Python",
    "JavaScript",
    "RFID Systems",
    "Cybersecurity",
    "Embedded Software",
    "Web Development",
    "React",
    "Data Analysis"
  ];

  const experience = [
    {
      title: "RFID Engineer / Graduate Research Assistant",
      org:   "Los Alamos National Laboratory",
      date:  "2023 — Present",
      desc:  "Working on RFID systems and software development. Describe your key projects and achievements here."
    },
    {
      title: "B.S. in Engineering Science",
      org:   "St. Mary's University",
      date:  "2019 — 2023",
      desc:  "Relevant coursework, honors, activities, or thesis work you'd like to highlight."
    },
    {
      title: "M.S. in Transdisciplinary Cyber Security",
      org:   "New Mexico Tech",
      date:  "2024 — 2026 (Expected)",
      desc:  "Describe your focus areas, research, or notable coursework."
    }
  ];

  const publications = [
    {
      title: "Publication Title",
      venue: "Journal / Conference Name",
      date:  "2024",
      link:  "#",
      desc:  "Brief summary of the paper or research."
    }
  ];

  const awards = [
    {
      title: "Award Name",
      org:   "Awarding Organization",
      date:  "2023",
      desc:  "Brief description of the award and why it was given."
    }
  ];

  // ╔═══════════════════════════════════════════════════════════════╗
  // ║  🛑  STOP — Don't edit below this line                       ║
  // ║  This code reads the variables above and fills in the page   ║
  // ╚═══════════════════════════════════════════════════════════════╝

  document.getElementById("nav-name").textContent = myName;
  document.getElementById("hero-name").textContent = myName;
  document.getElementById("hero-title").innerHTML = title + "<br>" + company + "<br>" + myLocation;

  document.getElementById("email-link").href = "mailto:" + email;
  document.getElementById("email-text").textContent = email;
  document.getElementById("linkedin-link").href = linkedin;
  document.getElementById("github-link").href = github;
  document.getElementById("resume-link").href = resumeURL;

  document.getElementById("bio-1").textContent = bio1;
  document.getElementById("bio-2").textContent = bio2;

  document.getElementById("skills-container").innerHTML =
    skills.map(s => `<span class="interest-tag">${s}</span>`).join("");

  document.getElementById("experience-container").innerHTML =
    experience.map(e => `
      <div class="exp-card">
        <h3>${e.title}</h3>
        <div class="org">${e.org}</div>
        <div class="date">${e.date}</div>
        <p>${e.desc}</p>
      </div>
    `).join("");

  document.getElementById("publications-container").innerHTML =
    publications.map(p => `
      <a href="${p.link}" class="exp-card" style="text-decoration:none; color:inherit; display:block;">
        <h3>${p.title}</h3>
        <div class="org">${p.venue}</div>
        <div class="date">${p.date}</div>
        <p>${p.desc}</p>
      </a>
    `).join("");

  document.getElementById("awards-container").innerHTML =
    awards.map(a => `
      <div class="exp-card">
        <h3>${a.title}</h3>
        <div class="org">${a.org}</div>
        <div class="date">${a.date}</div>
        <p>${a.desc}</p>
      </div>
    `).join("");

  document.getElementById("footer").innerHTML =
    `&copy; 2026 ${myName} &middot; <a href="mailto:${email}">${email}</a>`;

  document.title = myName + " — Portfolio";
</script>

</body>
</html>
