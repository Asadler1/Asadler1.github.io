<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anthony Sadler — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2332;
    --slate: #2c3e50;
    --accent: #3a7ca5;
    --accent-light: #d6eaf8;
    --warm-white: #faf9f7;
    --text: #2d2d2d;
    --text-light: #5a6a7a;
    --border: #e2e8f0;
    --card-bg: #ffffff;
    --shadow: 0 2px 20px rgba(26, 35, 50, 0.08);
    --shadow-hover: 0 8px 30px rgba(26, 35, 50, 0.14);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-white);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--navy);
    padding: 0 2rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60px;
  }
  .nav-links { display: flex; gap: 0.25rem; }
  .nav-tab {
    color: rgba(255,255,255,0.75);
    background: none;
    border: none;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .nav-tab:hover { color: #fff; background: rgba(255,255,255,0.1); }
  .nav-tab.active { color: #fff; background: rgba(255,255,255,0.15); }

  .hero {
    background: linear-gradient(135deg, rgba(26, 35, 50, 0.7) 0%, rgba(44, 62, 80, 0.7) 100%), url('images/hero-bg.jpg');
    background-size: cover;
    background-position: center;
    padding: 4rem 2rem 3.5rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(58,124,165,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .hero-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 3rem;
    align-items: stretch;
    position: relative;
  }
  .hero-photo {
    width: 340px;
    height: 100%;
    min-height: 400px;
    border-radius: 16px;
    object-fit: cover;
    border: 4px solid rgba(255,255,255,0.15);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    background: linear-gradient(135deg, var(--accent), #5ba4c9);
  }
  .hero-info h1 {
    font-family: 'Source Serif 4', serif;
    font-size: 2.6rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
    margin-bottom: 0.3rem;
  }
  .hero-info .title {
    font-size: 1.15rem;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
    margin-bottom: 1.2rem;
    line-height: 1.5;
  }
  .hero-contact {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
  }
  .hero-contact a {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.85);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .hero-contact a:hover {
    background: rgba(255,255,255,0.2);
    color: #fff;
  }
  .hero-contact a svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 2rem 4rem;
  }

  section { margin-bottom: 3rem; }

  .section-title {
    font-family: 'Source Serif 4', serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 1.2rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--accent);
    display: inline-block;
  }

  .bio p {
    font-size: 1.02rem;
    color: var(--text);
    margin-bottom: 1rem;
    max-width: 780px;
  }

  .interests {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  .interest-tag {
    background: var(--accent-light);
    color: var(--accent);
    padding: 0.35rem 0.9rem;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .experience-grid {
    display: grid;
    gap: 1.2rem;
  }
  .exp-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem 1.8rem;
    box-shadow: var(--shadow);
    transition: box-shadow 0.25s;
  }
  .exp-card:hover { box-shadow: var(--shadow-hover); }
  .exp-card h3 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 0.15rem;
  }
  .exp-card .org {
    color: var(--accent);
    font-weight: 600;
    font-size: 0.95rem;
  }
  .exp-card .date {
    color: var(--text-light);
    font-size: 0.85rem;
    margin-bottom: 0.6rem;
  }
  .exp-card p {
    font-size: 0.95rem;
    color: var(--text);
  }


  .tab-content { display: none; }
  .tab-content.active { display: block; }

  footer {
    background: var(--navy);
    color: rgba(255,255,255,0.5);
    text-align: center;
    padding: 2rem;
    font-size: 0.85rem;
  }
  footer a { color: rgba(255,255,255,0.7); }

  .resume-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--accent);
    color: #fff;
    padding: 0.6rem 1.4rem;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    margin-top: 1rem;
    transition: all 0.2s;
    border: none;
  }
  .resume-btn:hover {
    background: #2e6a8f;
    transform: translateY(-1px);
  }

  @media (max-width: 768px) {
    .hero-inner {
      grid-template-columns: 1fr;
      text-align: center;
      gap: 1.5rem;
    }
    .hero-photo {
      margin: 0 auto;
      width: 200px;
      height: 200px;
      min-height: auto;
    }
    .hero-info h1 { font-size: 2rem; }
    .hero-contact { justify-content: center; }
    .projects-grid { grid-template-columns: 1fr; }
    .section-title { font-size: 1.35rem; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  section {
    animation: fadeUp 0.5s ease-out both;
  }
  section:nth-child(2) { animation-delay: 0.1s; }
  section:nth-child(3) { animation-delay: 0.2s; }
  section:nth-child(4) { animation-delay: 0.3s; }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="nav-links">
      <button class="nav-tab active" data-tab="about">About</button>
      <button class="nav-tab" data-tab="publications">Publications</button>
      <button class="nav-tab" data-tab="awards">Awards</button>
    </div>
  </div>
</nav>

<header class="hero">
  <div class="hero-inner">
    <div class="hero-info">
      <h1 id="hero-name"></h1>
      <div class="title" id="hero-title"></div>
      <div class="hero-contact">
        <a id="email-link" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 4 10 8 10-8"/></svg>
          <span id="email-text"></span>
        </a>
        <a id="linkedin-link" href="#" target="_blank">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66z"/></svg>
          LinkedIn
        </a>
        <a id="github-link" href="#" target="_blank">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub
        </a>
      </div>
      <a href="#" class="resume-btn" id="resume-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></svg>
        Download Resume (PDF)
      </a>
    </div>
    <img class="hero-photo" id="hero-photo" src="images/me.jpg" alt="Anthony Sadler">
  </div>
</header>

<main>
  <section id="about" class="tab-content active" data-tab-content="about">
    <div class="bio">
      <h2 class="section-title">About Me</h2>
      <p id="bio-1"></p>
      <p id="bio-2"></p>
      <h3 style="font-size:1rem; color:var(--navy); margin-top:1.2rem; margin-bottom:0.5rem;">Interests &amp; Skills</h3>
      <div class="interests" id="skills-container"></div>
    </div>
    <div style="margin-top: 2.5rem;">
      <h2 class="section-title">Experience</h2>
      <div class="experience-grid" id="experience-container"></div>
    </div>
  </section>

  <section id="publications" class="tab-content" data-tab-content="publications">
    <h2 class="section-title">Publications</h2>
    <div class="publications-list" id="publications-container"></div>
  </section>

  <section id="awards" class="tab-content" data-tab-content="awards">
    <h2 class="section-title">Awards & Achievements</h2>
    <div class="awards-list" id="awards-container"></div>
  </section>
</main>

<footer id="footer"></footer>

<script>
  // ╔═══════════════════════════════════════════════════════════════╗
  // ║  ✏️  EDIT YOUR INFO HERE                                     ║
  // ║  Change the values below — the entire page updates           ║
  // ║  automatically. You never need to touch the HTML above.      ║
  // ╚═══════════════════════════════════════════════════════════════╝

  const myName     = "Anthony Sadler";
  const email      = "sadleranthony18@gmail.com";
  const title      = "RFID Engineer / Software Developer";
  const company    = "Los Alamos National Laboratory";
  const myLocation = "Los Alamos, New Mexico";
  const github     = "https://github.com/Asadler1";
  const linkedin   = "https://www.linkedin.com/in/anthony-sadler-2498b0256";
  const resumeURL  = "#";  // Replace with a link to your resume PDF

  const bio1 = "I currently work at Los Alamos National Laboratory and graduated from St. Mary's University in 2023 with a BS in Engineering Science. I am also working on a MS in Transdisciplinary Cyber Security at New Mexico Tech, where I am expected to graduate in May 2026.";

  const bio2 = "My interests span RFID systems, embedded software, cybersecurity, and full-stack web development. I enjoy building tools that solve real problems and am always looking for new challenges.";

  const skills = [
    "Python",
    "JavaScript",
    "RFID Systems",
    "Cybersecurity",
    "Embedded Software",
    "Web Development",
    "React",
    "Data Analysis"
  ];

  const experience = [
    {
      title: "RFID Engineer / Graduate Research Assistant",
      org:   "Los Alamos National Laboratory",
      date:  "2023 — Present",
      desc:  "Working on RFID systems and software development. Describe your key projects and achievements here."
    },
    {
      title: "B.S. in Engineering Science",
      org:   "St. Mary's University",
      date:  "2019 — 2023",
      desc:  "Relevant coursework, honors, activities, or thesis work you'd like to highlight."
    },
    {
      title: "M.S. in Transdisciplinary Cyber Security",
      org:   "New Mexico Tech",
      date:  "2024 — 2026 (Expected)",
      desc:  "Describe your focus areas, research, or notable coursework."
    }
  ];

  const publications = [
    {
      title: "Publication Title",
      venue: "Journal / Conference Name",
      date:  "2024",
      link:  "#",
      desc:  "Brief summary of the paper or research."
    }
  ];

  const awards = [
    {
      title: "Award Name",
      org:   "Awarding Organization",
      date:  "2023",
      desc:  "Brief description of the award and why it was given."
    }
  ];

  // ╔═══════════════════════════════════════════════════════════════╗
  // ║  🛑  STOP — Don't edit below this line                       ║
  // ║  This code reads the variables above and fills in the page   ║
  // ╚═══════════════════════════════════════════════════════════════╝

  document.getElementById("hero-name").textContent = myName;
  document.getElementById("hero-title").innerHTML = title + "<br>" + company + "<br>" + myLocation;

  document.getElementById("email-link").href = "mailto:" + email;
  document.getElementById("email-text").textContent = email;
  document.getElementById("linkedin-link").href = linkedin;
  document.getElementById("github-link").href = github;
  document.getElementById("resume-link").href = resumeURL;

  document.getElementById("bio-1").textContent = bio1;
  document.getElementById("bio-2").textContent = bio2;

  document.getElementById("skills-container").innerHTML =
    skills.map(s => `<span class="interest-tag">${s}</span>`).join("");

  document.getElementById("experience-container").innerHTML =
    experience.map(e => `
      <div class="exp-card">
        <h3>${e.title}</h3>
        <div class="org">${e.org}</div>
        <div class="date">${e.date}</div>
        <p>${e.desc}</p>
      </div>
    `).join("");

  document.getElementById("publications-container").innerHTML =
    publications.map(p => `
      <a href="${p.link}" class="exp-card" style="text-decoration:none; color:inherit; display:block;">
        <h3>${p.title}</h3>
        <div class="org">${p.venue}</div>
        <div class="date">${p.date}</div>
        <p>${p.desc}</p>
      </a>
    `).join("");

  document.getElementById("awards-container").innerHTML =
    awards.map(a => `
      <div class="exp-card">
        <h3>${a.title}</h3>
        <div class="org">${a.org}</div>
        <div class="date">${a.date}</div>
        <p>${a.desc}</p>
      </div>
    `).join("");

  document.getElementById("footer").innerHTML =
    `&copy; 2026 ${myName} &middot; <a href="mailto:${email}">${email}</a>`;

  document.title = myName + " — Portfolio";

  // Tab switching
  const tabBtns = document.querySelectorAll('.nav-tab');
  const tabSections = document.querySelectorAll('.tab-content');

  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      tabSections.forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      document.querySelector(`[data-tab-content="${btn.dataset.tab}"]`).classList.add('active');
    });
  });
</script>

</body>
</html>
