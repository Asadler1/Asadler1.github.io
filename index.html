<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  html { scroll-behavior: smooth; }

  :root {
    --navy: #1a2332;
    --slate: #2c3e50;
    --accent: #00c97a;
    --accent-light: #d0f7ea;
    --warm-white: #faf9f7;
    --text: #2d2d2d;
    --text-light: #5a6a7a;
    --border: #e2e8f0;
    --card-bg: #ffffff;
    --shadow: 0 2px 20px rgba(26, 35, 50, 0.08);
    --shadow-hover: 0 8px 30px rgba(26, 35, 50, 0.14);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0f1419 url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" opacity="0.08"><defs><pattern id="circuit" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse"><rect x="20" y="20" width="160" height="160" fill="none" stroke="%2300c97a" stroke-width="1"/><circle cx="40" cy="40" r="3" fill="%2300c97a"/><circle cx="160" cy="40" r="3" fill="%2300c97a"/><circle cx="40" cy="160" r="3" fill="%2300c97a"/><circle cx="160" cy="160" r="3" fill="%2300c97a"/><path d="M 40 40 L 100 40 L 100 100 L 160 100 M 40 160 L 100 160 L 100 100" stroke="%2300c97a" stroke-width="1" fill="none"/><circle cx="100" cy="100" r="8" fill="none" stroke="%2300c97a" stroke-width="1"/></pattern></defs><rect width="200" height="200" fill="%230f1419"/><rect width="200" height="200" fill="url(%23circuit)"/></svg>');
    background-attachment: fixed;
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--navy);
    padding: 0 2rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    height: 60px;
  }
  .nav-links { display: flex; gap: 0.25rem; }
  .nav-tab {
    color: rgba(255,255,255,0.75);
    background: none;
    border: none;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-block;
  }
  .nav-tab:hover { color: #fff; background: rgba(255,255,255,0.1); }

  .hero {
    background: linear-gradient(135deg, rgba(26, 35, 50, 0.7) 0%, rgba(44, 62, 80, 0.7) 100%), url('images/hero-bg.jpg');
    background-size: cover;
    background-position: center;
    padding: 4rem 2rem 3.5rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(58,124,165,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .hero-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 3rem;
    align-items: stretch;
    position: relative;
    z-index: 1;
  }
  .hero-photo {
    width: 340px;
    height: 100%;
    min-height: 400px;
    border-radius: 16px;
    object-fit: cover;
    border: 4px solid rgba(255,255,255,0.15);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    background: linear-gradient(135deg, var(--accent), #5ba4c9);
  }
  .hero-info h1 {
    font-family: 'Source Serif 4', serif;
    font-size: 2.6rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
    margin-bottom: 0.3rem;
  }
  .hero-info .title {
    font-size: 1.15rem;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
    margin-bottom: 1.2rem;
    line-height: 1.5;
  }
  .hero-contact {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
  }
  .hero-contact a {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.85);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .hero-contact a:hover {
    background: rgba(255,255,255,0.2);
    color: #fff;
  }
  .hero-contact a svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 2rem 4rem;
  }

  section { margin-bottom: 3rem; }

  .section-title {
    font-family: 'Source Serif 4', serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 1.2rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--accent);
    display: inline-block;
  }

  .bio p {
    font-size: 1.02rem;
    color: var(--text);
    margin-bottom: 1rem;
    max-width: 780px;
  }

  .interests {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  .interest-tag {
    background: var(--accent-light);
    color: var(--accent);
    padding: 0.35rem 0.9rem;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .experience-grid {
    display: grid;
    gap: 1.2rem;
  }
  .exp-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem 1.8rem;
    box-shadow: var(--shadow);
    transition: box-shadow 0.25s;
  }
  .exp-card:hover { box-shadow: var(--shadow-hover); }
  .exp-card h3 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 0.15rem;
  }
  .exp-card .org {
    color: var(--accent);
    font-weight: 600;
    font-size: 0.95rem;
  }
  .exp-card .date {
    color: var(--text-light);
    font-size: 0.85rem;
    margin-bottom: 0.6rem;
  }
  .exp-card p {
    font-size: 0.95rem;
    color: var(--text);
  }
  .award-card {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 1.5rem;
    align-items: start;
  }
  .award-card img {
    width: 100%;
    height: auto;
    border-radius: 12px;
    object-fit: cover;
  }
  @media (max-width: 768px) {
    .award-card {
      grid-template-columns: 1fr;
    }
  }


  footer {
    background: var(--navy);
    color: rgba(255,255,255,0.5);
    text-align: center;
    padding: 2rem;
    font-size: 0.85rem;
  }
  footer a { color: rgba(255,255,255,0.7); }

  .resume-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--accent);
    color: #fff;
    padding: 0.6rem 1.4rem;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    margin-top: 1rem;
    transition: all 0.2s;
    border: none;
  }
  .resume-btn:hover {
    background: #2e6a8f;
    transform: translateY(-1px);
  }

  @media (max-width: 768px) {
    .hero-inner {
      grid-template-columns: 1fr;
      text-align: center;
      gap: 1.5rem;
    }
    .hero-photo {
      margin: 0 auto;
      width: 200px;
      height: 200px;
      min-height: auto;
    }
    .hero-info h1 { font-size: 2rem; }
    .hero-contact { justify-content: center; }
    .projects-grid { grid-template-columns: 1fr; }
    .section-title { font-size: 1.35rem; }
  }

  @keyframes rfid-pulse {
    0% { transform: scale(0.8); opacity: 0.6; }
    100% { transform: scale(2.5); opacity: 0; }
  }
  @keyframes scan-line {
    0% { top: 0; opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }
  @keyframes scan-line-horizontal {
    0% { left: -100%; }
    100% { left: 100%; }
  }
  @keyframes signal-dot {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  .rfid-waves {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 400px;
    height: 400px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }
  .rfid-wave {
    position: absolute;
    border: 3px solid rgba(0, 201, 122, 0.6);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: rfid-pulse 3s ease-out infinite;
    box-shadow: 0 0 15px rgba(0, 201, 122, 0.4);
  }
  .rfid-wave:nth-child(1) { width: 120px; height: 120px; animation-delay: 0s; }
  .rfid-wave:nth-child(2) { width: 120px; height: 120px; animation-delay: 1s; }
  .rfid-wave:nth-child(3) { width: 120px; height: 120px; animation-delay: 2s; }

  .section-title {
    text-shadow: 0 0 12px rgba(0, 201, 122, 0.5);
  }

  .exp-card {
    position: relative;
    overflow: hidden;
    border: 2px solid var(--border);
    transition: all 0.3s ease;
  }
  .exp-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(0, 201, 122, 0.3), var(--shadow-hover);
  }
  .exp-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 201, 122, 0.2), transparent);
    animation: scan-line-horizontal 2s ease-in-out;
    opacity: 0;
    pointer-events: none;
  }
  .exp-card:hover::before {
    animation: scan-line-horizontal 1.2s ease-in-out;
    opacity: 1;
  }
  .exp-card::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .exp-card:hover::after {
    opacity: 1;
  }

  .signal-dots {
    display: flex;
    gap: 0.4rem;
    align-items: center;
  }
  .signal-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(0, 201, 122, 0.8);
    animation: signal-dot 1.2s ease-in-out infinite;
  }
  .signal-dot:nth-child(2) { animation-delay: 0.2s; }
  .signal-dot:nth-child(3) { animation-delay: 0.4s; }

  .rf-divider {
    display: flex;
    align-items: center;
    margin: 3rem 0;
    color: var(--accent);
  }
  .rf-divider::before,
  .rf-divider::after {
    content: '';
    flex: 1;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--accent), transparent);
  }
  .rf-divider svg {
    width: 32px;
    height: 32px;
    margin: 0 1.5rem;
    flex-shrink: 0;
    filter: drop-shadow(0 0 8px rgba(0, 201, 122, 0.6));
    animation: pulse-icon 2s ease-in-out infinite;
  }
  @keyframes pulse-icon {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(0, 201, 122, 0.6)); }
    50% { filter: drop-shadow(0 0 16px rgba(0, 201, 122, 1)); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  section {
    animation: fadeUp 0.5s ease-out both;
  }
  section:nth-child(2) { animation-delay: 0.1s; }
  section:nth-child(3) { animation-delay: 0.2s; }
  section:nth-child(4) { animation-delay: 0.3s; }
</style>
</head>
<body>

<script>

          <div class="org">${a.org}</div>
          <div class="date">${a.date}</div>
          <p>${a.desc}</p>
        </div>
        ${a.image ? `<img src="${a.image}" alt="${a.title}">` : ''}
      </div>
    `).join("");

  document.getElementById("footer").innerHTML =
    `&copy; 2026 ${myName} &middot; <a href="mailto:${email}">${email}</a>`;

  document.title = myName + " — Portfolio";
</script>

</body>
</html>
