  @keyframes scan-line {
    0% { top: 0; opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }
  @keyframes scan-line-horizontal {
    0% { left: -100%; }
    100% { left: 100%; }
  }
  @keyframes signal-dot {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }

  .rfid-waves {
    display: none;

  .exp-card {
    position: relative;
    overflow: hidden;
    border: 2px solid var(--border);
    transition: all 0.3s ease;
  }
  .exp-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(0, 201, 122, 0.3), var(--shadow-hover);
  }
  .exp-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 201, 122, 0.2), transparent);
    animation: scan-line-horizontal 2s ease-in-out;
    opacity: 0;
    pointer-events: none;
  }
  .exp-card:hover::before {
    animation: scan-line-horizontal 1.2s ease-in-out;
    opacity: 1;
  }
  .exp-card::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .exp-card:hover::after {
    opacity: 1;
  }

  .signal-dots {
    display: flex;
    gap: 0.4rem;
    align-items: center;

  .signal-dot {

    height: 8px;

  section:nth-child(4) { animation-delay: 0.3s; }

  document.getElementById("hero-name").textContent = myName;

  // Typing animation for title
  const titleElement = document.getElementById("hero-title");
  const titles = [title + "<br>" + company + "<br>" + myLocation];
  let titleIndex = 0;
  let charIndex = 0;
  let isDeleting = false;
  const typeSpeed = 50;
  const deleteSpeed = 30;
  const pauseDuration = 2000;

  function typeTitle() {
    const currentTitle = titles[titleIndex];
    const textToShow = currentTitle.substring(0, charIndex);
    titleElement.innerHTML = textToShow + '<span class="typing-text"></span>';

    if (!isDeleting && charIndex < currentTitle.length) {
      charIndex++;
      setTimeout(typeTitle, typeSpeed);
    } else if (isDeleting && charIndex > 0) {
      charIndex--;
      setTimeout(typeTitle, deleteSpeed);
    } else if (!isDeleting && charIndex === currentTitle.length) {
      setTimeout(() => {
        isDeleting = true;
        typeTitle();
      }, pauseDuration);
    } else if (isDeleting && charIndex === 0) {
      isDeleting = false;
      titleIndex = (titleIndex + 1) % titles.length;
      setTimeout(typeTitle, 500);
    }
  }

  typeTitle();

  document.getElementById("email-link").href = "mailto:" + email;
  document.getElementById("email-text").textContent = email;
  document.getElementById("linkedin-link").href = linkedin;
  document.getElementById("github-link").href = github;
  document.getElementById("resume-link").href = resumeURL;

  document.getElementById("bio-1").textContent = bio1;
  document.getElementById("bio-2").textContent = bio2;

  document.getElementById("skills-container").innerHTML =
    skills.map(s => `<span class="interest-tag">${s}</span>`).join("");

  document.getElementById("experience-container").innerHTML =
    experience.map(e => `
      <div class="exp-card">
        <h3>${e.title}</h3>
        <div class="org">${e.org}</div>
        <div class="date">${e.date}</div>
        <p>${e.desc}</p>
      </div>
    `).join("");

  document.getElementById("publications-container").innerHTML =
    publications.map(p => `
      <a href="${p.link}" class="exp-card" style="text-decoration:none; color:inherit; display:block;">
        <h3>${p.title}</h3>
        <div class="org">${p.venue}</div>
        <div class="date">${p.date}</div>
        <p>${p.desc}</p>
      </a>
    `).join("");

  document.getElementById("awards-container").innerHTML =
    awards.map(a => `
      <div class="exp-card award-card">
        <div>
          <h3>${a.title}</h3>
          <div class="org">${a.org}</div>
          <div class="date">${a.date}</div>
          <p>${a.desc}</p>
        </div>
        ${a.image ? `<img src="${a.image}" alt="${a.title}">` : ''}
      </div>
    `).join("");

  document.getElementById("footer").innerHTML =
    `&copy; 2026 ${myName} &middot; <a href="mailto:${email}">${email}</a>`;

  document.title = myName + " — Portfolio";

  // IntersectionObserver for fade-on-scroll hero effect
  const hero = document.querySelector('.hero');
  const mainElement = document.querySelector('main');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        hero.classList.add('fade-out');
      } else {
        hero.classList.remove('fade-out');
      }
    });
  }, {
    threshold: 0.1
  });

  observer.observe(mainElement);
</script>
</body>
</html>
